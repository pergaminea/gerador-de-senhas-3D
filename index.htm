<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gerador de Senhas</title>
</head>
<body>
   <section class="conteudo">
    <div class="conteudo-titulo">
        <img src="cadeado.png" alt="cadeado fechado">
        <h1 class="titulo=principal">Gerador de Senhas</h1>
        <h2 class="titulo-secundario">Gere uma senha aleatória e segura</h2>
    </div>
    
    <div class="conteudo-senha">
        <label for="senha">Senha</label>
        <input name="senha" type="text" id="campo-senha">
    </div>
    <div class="parametro"></div>
        <h3 class="parametro-titulo">Personalize sua senha</h3>
        <div class="parametro-coluna__senha">
            <div class="parametro-senha">
                <h4 class="parametro-senha__titulo">Número de caracteres</h4>
                <div class="parametro-senha-botoes">
                    <button class="parametro-senha__botao">-</button>
                    <p class="parametro-senha__texto">8</p>
                    <button class="parametro-senha__botao">+</button>
                </div>
            </div>
        </div>
    </div>
   </section>
</body>
</html>
